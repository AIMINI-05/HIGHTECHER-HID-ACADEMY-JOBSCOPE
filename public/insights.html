<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 인사이트 — Academy Job Scope</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="js/config.js"></script>
<script type="module" src="js/firebase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F4F0;--bg-card:#fff;--bg-surface:#F0EFE9;--text-primary:#111116;--text-secondary:#5A5A68;--text-hint:#9898A8;--border:rgba(17,17,22,0.09);--navy:#0B1D35;--navy-light:#1A3560;--green:#1EA87A;--green-light:rgba(30,168,122,0.1);--red:#E05252;--orange:#F59E3A;--blue:#3B82F6;--purple:#8B5CF6;--radius-md:10px;--radius-lg:14px;--shadow-card:0 1px 4px rgba(0,0,0,0.06);--shadow-hover:0 6px 20px rgba(0,0,0,0.1)}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh}
body.dark{--bg:#080E1A;--bg-card:#0F1929;--bg-surface:#162035;--text-primary:#E2E8F4;--text-secondary:#7A85A0;--text-hint:#445068;--border:rgba(56,217,169,0.12);--navy:#1A3560;--navy-light:#2A4A80;--green:#38D9A9;--green-light:rgba(56,217,169,0.1);--shadow-card:0 1px 6px rgba(0,0,0,0.4);--shadow-hover:0 8px 28px rgba(0,0,0,0.5)}
header{background:#0B1D35;border-bottom:1px solid rgba(255,255,255,0.07);padding:0 2rem;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo-area{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#38D9A9,#1EA87A);display:flex;align-items:center;justify-content:center}
.logo-mark img{width:65%;height:65%;object-fit:contain;filter:brightness(10)}
.logo-text{font-size:15px;font-weight:700;color:#fff}
.header-nav{display:flex;align-items:center;gap:8px}
.page-tabs{display:flex;gap:4px}
.page-tab{padding:6px 14px;border:none;border-radius:20px;font-size:12px;font-weight:600;font-family:inherit;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);cursor:pointer;transition:all .15s;text-decoration:none}
.page-tab.active,.page-tab:hover{background:rgba(56,217,169,0.2);color:#38D9A9}
.nav-back{display:flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(255,255,255,0.08);border:none;border-radius:8px;color:rgba(255,255,255,0.7);font-size:13px;font-family:inherit;cursor:pointer;text-decoration:none;transition:all .15s}
.nav-back:hover{background:rgba(255,255,255,0.14);color:#fff}

.page-content{max-width:1200px;margin:0 auto;padding:2rem 2rem 4rem}
.page-head{margin-bottom:28px}
.page-eyebrow{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--green);text-transform:uppercase;margin-bottom:8px}
.page-title{font-size:26px;font-weight:800;color:var(--text-primary);letter-spacing:-0.5px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text-hint)}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-card)}
.stat-label{font-size:11px;color:var(--text-hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat-val.green{color:var(--green)}
.stat-val.orange{color:var(--orange)}
.stat-sub{font-size:11px;color:var(--text-hint);margin-top:5px}
.stat-sub strong{color:var(--green)}

/* Two col */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-card)}
.card-title{font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.card-title span{font-size:11px;color:var(--text-hint);font-weight:400}

/* Trend chart */
.trend-wrap{position:relative;height:160px;display:flex;align-items:flex-end;gap:6px;padding-bottom:4px}
.trend-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.trend-bar{width:100%;border-radius:4px 4px 0 0;transition:height .5s ease;min-height:2px}
.trend-label{font-size:9px;color:var(--text-hint);white-space:nowrap}
.trend-val{font-size:9px;color:var(--text-secondary);font-weight:600}

/* Keyword bars */
.kw-rank-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.kw-rank-item:last-child{border-bottom:none}
.kw-rank-num{font-size:12px;font-weight:800;color:var(--text-hint);width:16px;flex-shrink:0}
.kw-rank-name{font-size:13px;font-weight:600;color:var(--text-primary);flex:1}
.kw-rank-bar{flex:2;height:6px;background:var(--bg-surface);border-radius:3px;overflow:hidden}
.kw-rank-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),#38D9A9);transition:width .8s ease}
.kw-rank-cnt{font-size:11px;color:var(--text-secondary);min-width:30px;text-align:right}

/* Company list */
.company-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.company-item:last-child{border-bottom:none}
.company-rank{font-size:11px;font-weight:800;width:20px;color:var(--text-hint)}
.company-info{flex:1}
.company-name{font-size:13px;font-weight:600;color:var(--text-primary)}
.company-role{font-size:11px;color:var(--text-secondary)}
.company-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;background:rgba(30,168,122,0.1);color:var(--green)}

/* Heatmap */
.heatmap-wrap{overflow-x:auto}
.heatmap-table{border-collapse:collapse;width:100%;font-size:11px}
.heatmap-table th{font-weight:600;color:var(--text-hint);padding:6px 8px;text-align:center;white-space:nowrap}
.heatmap-table th:first-child{text-align:left}
.heatmap-table td{padding:5px 8px;text-align:center;border-radius:4px;font-weight:700;transition:transform .1s}
.heatmap-table td:hover{transform:scale(1.1)}
.heatmap-table td:first-child{font-size:12px;font-weight:600;color:var(--text-secondary);text-align:left;font-weight:400}
.heat-legend{display:flex;align-items:center;gap:8px;margin-top:10px;justify-content:flex-end}
.heat-legend-label{font-size:10px;color:var(--text-hint)}
.heat-legend-bar{display:flex;gap:2px}
.heat-swatch{width:16px;height:10px;border-radius:2px}

.icon-moon-sub,.icon-sun-sub{transition:opacity .2s}
</style>

</head>
<body>
<script>
/* ── 테마 즉시 적용 (FOUC 방지) ── */
(function(){
  try{ if(localStorage.getItem('ajs_theme')==='dark') document.body.classList.add('dark'); }catch(e){}
})();
</script>
<header>
  <div class="header-inner">
    <a class="logo-area" href="index.html">
      <div class="logo-mark"><img src="logo.png" alt="logo"></div>
      <span class="logo-text">Academy Job Scope</span>
    </a>
    <div class="header-nav">
      <div class="page-tabs">
        <a href="ask.html" class="page-tab" style="display:flex;align-items:center;gap:5px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="13" y2="14"/></svg> AI Ask</a>
        <a href="calendar.html" class="page-tab" style="display:flex;align-items:center;gap:5px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> 캘린더</a>
        <span class="page-tab active" style="display:flex;align-items:center;gap:5px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg> Insights</span>
      </div>

      <button onclick="toggleTheme()" title="다크/라이트 전환" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.5);padding:7px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .15s" onmouseover="this.style.background='rgba(255,255,255,0.08)';this.style.color='#fff'" onmouseout="this.style.background='none';this.style.color='rgba(255,255,255,0.5)'">
          <svg class="th-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="th-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      <a href="index.html" class="nav-back">← 공고 목록</a>
    </div>
  </div>
</header>

<div class="page-content">
  <div class="page-head">
    <div class="page-eyebrow" id="weekLabel">WEEKLY INSIGHTS</div>
    <div class="page-title">이번 주 채용 시장 한눈에 보기</div>
    <div class="page-sub">오라클 아카데미 수강 분야 중심 · 데이터 기반 리포트</div>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-label">전체 공고</div><div class="stat-val green" id="st-total">—</div><div class="stat-sub" id="st-total-sub"></div></div>
    <div class="stat-card"><div class="stat-label">평균 연봉 상단</div><div class="stat-val" id="st-salary">—</div><div class="stat-sub">데이터 직군 기준</div></div>
    <div class="stat-card"><div class="stat-label">가장 수요 높은 키워드</div><div class="stat-val" style="font-size:22px" id="st-topkw">—</div><div class="stat-sub" id="st-topkw-sub"></div></div>
    <div class="stat-card"><div class="stat-label">지역 분포 1위</div><div class="stat-val" style="font-size:22px" id="st-loc">—</div><div class="stat-sub" id="st-loc-sub"></div></div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-title">📈 주간 키워드 트렌드 <span>공고 수 기준</span></div>
      <div class="trend-wrap" id="trendChart"></div>
    </div>
    <div class="card">
      <div class="card-title">🏢 이번 주 활발한 기업</div>
      <div id="companyList"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" style="margin-bottom:8px">🔥 스킬 × 직무 수요 히트맵 <span>공고 내 키워드 매칭 비율</span></div>
    <div class="heatmap-wrap"><table class="heatmap-table" id="heatmap"></table></div>
    <div class="heat-legend">
      <span class="heat-legend-label">낮음</span>
      <div class="heat-legend-bar" id="heatLegend"></div>
      <span class="heat-legend-label">높음</span>
    </div>
  </div>
</div>

<script type="module">
function waitForFb(cb){ if(window._fb) cb(); else window.addEventListener('firebase-ready',cb,{once:true}); }
function dday(dl){if(!dl)return 999;const d=new Date(dl);d.setHours(23,59,59,999);return Math.ceil((d-new Date())/86400000);}

const KEYWORDS=['Python','SQL','PyTorch','Spark','LLM','헬스케어','MLOps','데이터 분석','딥러닝','NLP'];
const ROLES=['데이터 분석가','데이터 엔지니어','ML 엔지니어','AI 리서치','백엔드'];
const ROLE_KWS=['데이터 분석','데이터 엔지니어','ML','AI','백엔드'];

function heatColor(v){
  if(v===0) return{bg:'rgba(0,0,0,0.04)',color:'var(--text-hint)'};
  if(v<30) return{bg:'rgba(59,130,246,0.08)',color:'#3B82F6'};
  if(v<50) return{bg:'rgba(59,130,246,0.18)',color:'#2563EB'};
  if(v<70) return{bg:'rgba(139,92,246,0.2)',color:'#7C3AED'};
  if(v<85) return{bg:'rgba(30,168,122,0.25)',color:'#1EA87A'};
  return{bg:'rgba(30,168,122,0.45)',color:'#0B5C40'};
}

function buildInsights(jobs){
  const now=new Date();
  const weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-7);
  const newJobs=jobs.filter(j=>{const ca=new Date(j.createdAt||0);return ca>=weekAgo;});
  const prevCnt=jobs.length-newJobs.length;

  // Stats
  document.getElementById('st-total').textContent=jobs.length;
  const diff=newJobs.length;
  document.getElementById('st-total-sub').innerHTML=`신규 ${diff}건 <strong>+${Math.round(diff/Math.max(prevCnt,1)*100)}%</strong>`;

  // Salary avg
  let salaries=[];
  jobs.forEach(j=>{
    const raw=(j.salary||'').replace(/,/g,'');
    const m=raw.match(/(\d+)/g);
    if(m) salaries.push(...m.map(Number).filter(v=>v>100&&v<20000));
  });
  const avgSal=salaries.length?Math.round(salaries.reduce((a,b)=>a+b,0)/salaries.length):null;
  document.getElementById('st-salary').textContent=avgSal?`${avgSal.toLocaleString()}만`:'협의';

  // Top keyword
  const kwCount={};
  KEYWORDS.forEach(k=>kwCount[k]=0);
  jobs.forEach(j=>{
    const txt=`${j.title||''} ${j.role||''} ${j.description||''} ${j.requirements||''}`.toLowerCase();
    KEYWORDS.forEach(k=>{if(txt.includes(k.toLowerCase()))kwCount[k]++;});
  });
  const topKw=Object.entries(kwCount).sort((a,b)=>b[1]-a[1])[0];
  if(topKw){
    document.getElementById('st-topkw').textContent=topKw[0];
    document.getElementById('st-topkw-sub').innerHTML=`공고 ${topKw[1]}건 (${Math.round(topKw[1]/Math.max(jobs.length,1)*100)}%)`;
  }

  // Top location
  const locCount={};
  jobs.forEach(j=>{
    const loc=(j.location||'').split(' ')[0];
    if(loc&&loc!=='미정') locCount[loc]=(locCount[loc]||0)+1;
  });
  const topLoc=Object.entries(locCount).sort((a,b)=>b[1]-a[1])[0];
  if(topLoc){
    document.getElementById('st-loc').textContent=topLoc[0];
    const second=Object.entries(locCount).sort((a,b)=>b[1]-a[1])[1];
    document.getElementById('st-loc-sub').innerHTML=`${Math.round(topLoc[1]/jobs.length*100)}% · 2위 ${second?second[0]:'—'} ${second?Math.round(second[1]/jobs.length*100):0}%`;
  }

  // Week label
  const wn=Math.ceil((now-new Date(now.getFullYear(),0,1))/(7*24*3600*1000));
  document.getElementById('weekLabel').textContent=`WEEKLY INSIGHTS · ${now.getFullYear()} W${wn}`;

  // Trend chart (keyword counts for top 3)
  const top3Kws=Object.entries(kwCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);
  const colors=['#1EA87A','#8B5CF6','#E05252'];
  const maxTrendVal=Math.max(...top3Kws.map(k=>kwCount[k]),1);
  document.getElementById('trendChart').innerHTML=top3Kws.map((k,i)=>`
    <div class="trend-bar-wrap" title="${k}: ${kwCount[k]}건">
      <div class="trend-val">${kwCount[k]}</div>
      <div class="trend-bar" style="height:${Math.max(kwCount[k]/maxTrendVal*120,4)}px;background:${colors[i]};opacity:0.8"></div>
      <div class="trend-label">${k}</div>
    </div>`).join('');

  // Company list (most active)
  const coCount={};
  jobs.forEach(j=>{if(j.company&&j.company!=='미정')(coCount[j.company]=(coCount[j.company]||{cnt:0,role:j.role||''}),coCount[j.company].cnt++);});
  const topCos=Object.entries(coCount).sort((a,b)=>b[1].cnt-a[1].cnt).slice(0,5);
  document.getElementById('companyList').innerHTML=topCos.map(([co,{cnt,role}],i)=>`
    <div class="company-item">
      <div class="company-rank">${i+1}</div>
      <div class="company-info">
        <div class="company-name">${co}</div>
        <div class="company-role">${role}</div>
      </div>
      <span class="company-badge">+${cnt}건</span>
    </div>`).join('');

  // Heatmap
  const skills=['Python','SQL','PyTorch','Spark','LLM','헬스케어'];
  const hm=document.getElementById('heatmap');
  let hmHtml=`<tr><th></th>${ROLES.map(r=>`<th>${r}</th>`).join('')}</tr>`;
  skills.forEach(skill=>{
    hmHtml+=`<tr><td>${skill}</td>`;
    ROLES.forEach((role,ri)=>{
      const roleJobs=jobs.filter(j=>{const txt=`${j.title||''} ${j.role||''} ${j.description||''}`.toLowerCase();return txt.includes(ROLE_KWS[ri].toLowerCase());});
      const cnt=roleJobs.filter(j=>{const txt=`${j.description||''} ${j.requirements||''}`.toLowerCase();return txt.includes(skill.toLowerCase());}).length;
      const pct=roleJobs.length?Math.round(cnt/roleJobs.length*100):0;
      const {bg,color}=heatColor(pct);
      hmHtml+=`<td style="background:${bg};color:${color}">${pct}</td>`;
    });
    hmHtml+='</tr>';
  });
  hm.innerHTML=hmHtml;

  // Legend
  document.getElementById('heatLegend').innerHTML=[0,20,40,60,80,100].map(v=>{
    const {bg}=heatColor(v);
    return`<div class="heat-swatch" style="background:${bg}"></div>`;
  }).join('');
}

waitForFb(()=>{
  window._fb.subscribe(jobs=>{buildInsights(jobs);});
});

/* ── 테마 토글 ── */
window.toggleTheme = function(){
  var isDark = document.body.classList.toggle('dark');
  try{ localStorage.setItem('ajs_theme', isDark ? 'dark' : 'light'); }catch(e){}
  _syncTheme();
};
function _syncTheme(){
  var isDark = document.body.classList.contains('dark');
  document.querySelectorAll('.th-moon').forEach(function(el){ el.style.display = isDark ? 'none' : 'block'; });
  document.querySelectorAll('.th-sun').forEach(function(el){ el.style.display = isDark ? 'block' : 'none'; });
}
_syncTheme();
</script>
</body>
